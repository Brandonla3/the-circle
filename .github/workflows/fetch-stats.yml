name: Weekly D1 Softball Stats

on:
  schedule:
    - cron: '0 5 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Run fetch_d1_stats.py
        run: python scripts/fetch_d1_stats.py

      - name: Commit data files and push branch
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE="$(date -u +%Y-%m-%d)"
          BRANCH="stats/weekly-${DATE}"

          git checkout -b "$BRANCH"
          git add data/

          if git diff --cached --quiet; then
            echo "No stat changes."
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "stats: weekly D1 softball update ${DATE}"
            git push origin "$BRANCH"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.commit.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"
          DATE="${{ steps.commit.outputs.date }}"
          YEAR="$(date -u +%Y)"
          gh pr create --base main --head "$BRANCH" --title "stats: weekly D1 softball update ${DATE}" --body "Weekly D1 Softball Stats ${DATE}. All 30 conferences, batters/pitchers/fielding. Merge to auto-deploy to Vercel."
