# ============================================================
# fetch-stats.yml
# ============================================================
# Runs every Friday night at 11 PM CST (Saturday 05:00 UTC).
# Also triggerable manually from the Actions tab at any time.
#
# Full pipeline:
#   1. Checkout repo
#   2. Install Python + deps
#   3. Run scripts/fetch_d1_stats.py
#      → writes data/d1_softball_stats_<YEAR>.xlsx
#      → writes data/json/<conf>/<section>.json  (feeds /api/d1-stats)
#      → writes data/json/index.json             (manifest)
#   4. Commit all data/ changes to a dated branch
#   5. Open a PR against main so you can review before merging
#   6. After you MERGE the PR, Vercel auto-deploys with the new data/
#      because Vercel is connected to the repo and redeploys on every
#      push to main.  No extra step needed.
#
# Required secrets (Settings → Secrets → Actions):
#   GH_PAT  — Personal Access Token with repo scope
#             (GITHUB_TOKEN can't open PRs on the same repo)
# ============================================================

name: Weekly D1 Softball Stats

on:
  schedule:
      # Every Friday at 05:00 UTC = Friday 11 PM CST / Saturday midnight CDT
          - cron: '0 5 * * 6'
            workflow_dispatch:     # manual trigger from Actions tab

            permissions:
              contents: write
                pull-requests: write

                jobs:
                  fetch-and-pr:
                      runs-on: ubuntu-latest
                          timeout-minutes: 30

                              steps:
                                    # ── 1. Checkout ──────────────────────────────────────────────────────
                                          - name: Checkout repository
                                                  uses: actions/checkout@v4
                                                          with:
                                                                    token: ${{ secrets.GH_PAT }}
                                                                              fetch-depth: 0

                                                                                    # ── 2. Python setup ──────────────────────────────────────────────────
                                                                                          - name: Set up Python 3.12
                                                                                                  uses: actions/setup-python@v5
                                                                                                          with:
                                                                                                                    python-version: '3.12'
                                                                                                                              cache: pip
                                                                                                                              
                                                                                                                                    - name: Install Python dependencies
                                                                                                                                            run: |
                                                                                                                                                      python -m pip install --upgrade pip
                                                                                                                                                                pip install requests openpyxl
                                                                                                                                                                
                                                                                                                                                                      # ── 3. Fetch all D1 stats ────────────────────────────────────────────
                                                                                                                                                                            - name: Run fetch_d1_stats.py
                                                                                                                                                                                    run: python scripts/fetch_d1_stats.py
                                                                                                                                                                                    
                                                                                                                                                                                          # ── 4. Commit to a dated branch ──────────────────────────────────────
                                                                                                                                                                                                - name: Commit data files and push branch
                                                                                                                                                                                                        id: commit
                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                          git config user.name  "github-actions[bot]"
                                                                                                                                                                                                                                    git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                              DATE="$(date -u +%Y-%m-%d)"
                                                                                                                                                                                                                                                        BRANCH="stats/weekly-${DATE}"
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                  git checkout -b "$BRANCH"
                                                                                                                                                                                                                                                                            git add data/
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                      if git diff --cached --quiet; then
                                                                                                                                                                                                                                                                                                  echo "No stat changes detected — skipping PR."
                                                                                                                                                                                                                                                                                                              echo "no_changes=true" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                    git commit -m "stats: weekly D1 softball update ${DATE}"
                                                                                                                                                                                                                                                                                                                                                git push origin "$BRANCH"
                                                                                                                                                                                                                                                                                                                                                            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                        echo "date=${DATE}"     >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                        # ── 5. Open PR ───────────────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                              - name: Open pull request
                                                                                                                                                                                                                                                                                                                                                                                                      if: steps.commit.outputs.no_changes != 'true'
                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                        GH_TOKEN: ${{ secrets.GH_PAT }}
                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                          BRANCH="${{ steps.commit.outputs.branch }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                    DATE="${{ steps.commit.outputs.date }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                              YEAR="$(date -u +%Y)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        gh pr create \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --base main \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --head "$BRANCH" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --title "stats: weekly D1 softball update ${DATE}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --body "## Weekly D1 Softball Stats — ${DATE}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Automated weekly pull — all 30 D1 conferences, 3 categories each (Batters / Pitchers / Fielding).
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ### What changed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        | File | Description |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        |------|-------------|
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        | \`data/d1_softball_stats_${YEAR}.xlsx\` | Updated Excel workbook — 1 sheet per conference+category |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        | \`data/json/<conf>/<section>.json\` | JSON files read by \`/api/d1-stats\` on Vercel |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        | \`data/json/index.json\` | Updated manifest with player counts |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ### After merging
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Vercel will automatically redeploy the app with the new \`data/json/\` files.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Your \`/api/d1-stats\` endpoint will immediately serve the updated stats — no manual steps needed.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ### How to use the new data in the frontend
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        \`\`\`js
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // All conferences index
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetch('/api/d1-stats')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // All sections for one conference
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetch('/api/d1-stats?conference=big-ten')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // One section
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetch('/api/d1-stats?conference=sec&section=batters')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Search + sort
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetch('/api/d1-stats?conference=acc&section=pitchers&search=Smith&sortBy=era&sortDir=asc')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        \`\`\`"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
