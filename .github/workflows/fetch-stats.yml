# ============================================================
# fetch-stats.yml
# ============================================================
# Runs every Friday night at 11 PM CST (Saturday 05:00 UTC).
# Also triggerable manually from the Actions tab.
#
# What it does:
#   1. Checks out the repo
#   2. Installs Python + deps (requests, openpyxl)
#   3. Runs scripts/fetch_d1_stats.py  →  produces data/d1_softball_stats_<YEAR>.xlsx
#   4. Commits the Excel file to a new branch
#   5. Opens a PR so you can review before merging to main
#
# Required secret:  GH_PAT
#   Go to Settings → Secrets → Actions → New repository secret
#   Name:  GH_PAT
#   Value: a GitHub Personal Access Token with repo scope
#   (The default GITHUB_TOKEN can't open PRs on the same repo, so PAT is needed.)
# ============================================================

name: Weekly D1 Softball Stats

on:
  schedule:
      # Every Friday at 05:00 UTC = Friday 11 PM CST / Saturday 12 AM CDT
          - cron: '0 5 * * 6'
            workflow_dispatch:   # also allows manual trigger from Actions tab

            permissions:
              contents: write
                pull-requests: write

                jobs:
                  fetch-and-pr:
                      runs-on: ubuntu-latest
                          timeout-minutes: 30

                              steps:
                                    # ── 1. Checkout ──────────────────────────────────────────
                                          - name: Checkout repository
                                                  uses: actions/checkout@v4
                                                          with:
                                                                    token: ${{ secrets.GH_PAT }}
                                                                              fetch-depth: 0

                                                                                    # ── 2. Python setup ──────────────────────────────────────
                                                                                          - name: Set up Python 3.12
                                                                                                  uses: actions/setup-python@v5
                                                                                                          with:
                                                                                                                    python-version: '3.12'
                                                                                                                              cache: pip
                                                                                                                              
                                                                                                                                    - name: Install dependencies
                                                                                                                                            run: |
                                                                                                                                                      python -m pip install --upgrade pip
                                                                                                                                                                pip install requests openpyxl
                                                                                                                                                                
                                                                                                                                                                      # ── 3. Fetch stats ───────────────────────────────────────
                                                                                                                                                                            - name: Fetch D1 softball stats
                                                                                                                                                                                    run: python scripts/fetch_d1_stats.py
                                                                                                                                                                                    
                                                                                                                                                                                          # ── 4. Commit to a dated branch ──────────────────────────
                                                                                                                                                                                                - name: Commit Excel file
                                                                                                                                                                                                        id: commit
                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                          git config user.name  "github-actions[bot]"
                                                                                                                                                                                                                                    git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                              BRANCH="stats/weekly-$(date -u +%Y-%m-%d)"
                                                                                                                                                                                                                                                        git checkout -b "$BRANCH"
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                  git add data/
                                                                                                                                                                                                                                                                            git diff --cached --quiet && echo "no_changes=true" >> "$GITHUB_OUTPUT" || true
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                      if git diff --cached --quiet; then
                                                                                                                                                                                                                                                                                                  echo "No changes to commit."
                                                                                                                                                                                                                                                                                                              echo "no_changes=true" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                    git commit -m "stats: weekly D1 softball update $(date -u +%Y-%m-%d)"
                                                                                                                                                                                                                                                                                                                                                git push origin "$BRANCH"
                                                                                                                                                                                                                                                                                                                                                            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                            # ── 5. Open PR ───────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                  - name: Open pull request
                                                                                                                                                                                                                                                                                                                                                                                          if: steps.commit.outputs.no_changes != 'true'
                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                            GH_TOKEN: ${{ secrets.GH_PAT }}
                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                              BRANCH="${{ steps.commit.outputs.branch }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                        DATE="$(date -u +%Y-%m-%d)"
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                  gh pr create \
                                                                                                                                                                                                                                                                                                                                                                                                                                                              --base main \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --head "$BRANCH" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --title "stats: weekly D1 softball update $DATE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --body "$(cat <<'EOF'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ## Weekly D1 Softball Stats Update
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Automated weekly pull — every D1 conference, all 3 stat categories (Batters / Pitchers / Fielding).
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                **File:** \`data/d1_softball_stats_$(date -u +%Y).xlsx\`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          **Generated:** $(date -u '+%A %B %-d, %Y at %H:%M UTC')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ### Sheets included
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              One sheet per conference + category (e.g. "Big Ten - Batters", "SEC - Pitchers").
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        First sheet is a 📋 Summary with player counts for every conference/section.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  Review the Excel file, then merge to update \`main\`.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      )"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
